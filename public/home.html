<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rạp Chiếu Phim Le Gia Bao</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #222;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      color: #ffcc00;
    }

    .movies {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .movie-card {
      background-color: #222;
      border-radius: 10px;
      overflow: hidden;
      width: 250px;
      box-shadow: 0 0 10px #000;
      text-align: center;
      transition: transform 0.3s;
    }

    .movie-card:hover {
      transform: scale(1.05);
    }

    .movie-card img {
      width: 100%;
      height: 350px;
      object-fit: cover;
    }

    .movie-card h3 {
      margin: 10px 0 5px 0;
      color: #ffcc00;
    }

    .movie-card p {
      font-size: 14px;
      margin: 0 10px 10px 10px;
    }

    .movie-card button {
      background-color: #ffcc00;
      border: none;
      padding: 10px 20px;
      margin-bottom: 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .movie-card button:hover {
      background-color: #e6b800;
    }
  </style>
</head>
<body>

  <header>
    <h1>Rạp Chiếu Phim Le Gia Bao</h1>
    <p>Danh sách phim đang chiếu</p>
  </header>

  <div class="movies">
    <div class="movie-card">
      <img src="https://via.placeholder.com/250x350.png?text=Avengers" alt="Avengers">
      <h3>Avengers: Endgame</h3>
      <p>Thể loại: Hành động, Khoa học viễn tưởng</p>
      <button>Mua vé</button>
    </div>

    <div class="movie-card">
      <img src="https://via.placeholder.com/250x350.png?text=Inception" alt="Inception">
      <h3>Inception</h3>
      <p>Thể loại: Hành động, Hồi hộp, Khoa học viễn tưởng</p>
      <button>Mua vé</button>
    </div>

    <div class="movie-card">
      <img src="https://via.placeholder.com/250x350.png?text=Titanic" alt="Titanic">
      <h3>Titanic</h3>
      <p>Thể loại: Tình cảm, Lịch sử</p>
      <button>Mua vé</button>
    </div>

    <div class="movie-card">
      <img src="https://via.placeholder.com/250x350.png?text=Spider-Man" alt="Spider-Man">
      <h3>Spider-Man: No Way Home</h3>
      <p>Thể loại: Hành động, Phiêu lưu</p>
      <button>Mua vé</button>
    </div>
  </div>

</body>
</html>
